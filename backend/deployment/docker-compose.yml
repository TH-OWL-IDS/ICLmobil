services:

  backend:
    build: containers/backend
    init: true
    healthcheck:
      test: ["CMD-SHELL", "curl -sSfL http://127.0.0.1:8000/api/v1/system/getAPIStatus | jq -e '.status == \"ok\"'"]
      interval: '5s'
      timeout: '30s'
      retries: 10
      start_period: '10s'
    env_file:
    - "env.global"
    - ".env"
    environment:
      - "STORAGE_DIR=/storage"
      - "LOCK_DIR=/lock"
      - "POSTGRES_BACKEND_USERNAME=backend"
      - "POSTGRES_BACKEND_PASSWORD=${POSTGRES_BACKEND_PASSWORD}"
    volumes:
      - "${USERDATA_BASEDIR}backend/storage:/storage"
      - "${USERDATA_BASEDIR}lock:/lock"
    ports:
      - "8000"
    networks:
      - internal
    depends_on:
      - db
    restart: unless-stopped

  celery-main:
    build: containers/backend
    init: true
    # see: docker compose exec -it celery celery -A backend worker --help
    # Make sure concurrency is high enough so all long-running tasks and the others have enough workers available
    command: ["celery", "-A", "backend", "worker", "-l", "DEBUG", "-E", "--concurrency", "12"]
    healthcheck:
      test: ["CMD-SHELL", "celery -A backend inspect ping -d celery@$$HOSTNAME"]
      interval: '5s'
      timeout: '30s'
      retries: 10
      start_period: '10s'
    env_file:
    - "env.global"
    - ".env"
    environment:
      - "STORAGE_DIR=/storage"
      - "LOCK_DIR=/lock"
      - "POSTGRES_BACKEND_USERNAME=backend"
      - "POSTGRES_BACKEND_PASSWORD=${POSTGRES_BACKEND_PASSWORD}"
    volumes:
      - "${USERDATA_BASEDIR}lock:/lock"
    networks:
      - internal
    depends_on:
      - db
      - rabbitmq
      - memcached
    restart: unless-stopped

  celery-beat:
    build: containers/backend
    init: true
    # see: docker compose exec -it celery celery -A backend worker --help
    # Make sure concurrency is high enough so all long-running tasks and the others have enough workers available
    command: ["celery", "-A", "backend", "beat", "-l", "DEBUG"]
    healthcheck:
      test: ["CMD-SHELL", "python3 beat-heartbeat-check.py --max-age 300"]
      interval: '60s'
      timeout: '30s'
      retries: 10
      start_period: '90s'
    env_file:
    - "env.global"
    - ".env"
    environment:
      - "STORAGE_DIR=/storage"
      - "LOCK_DIR=/lock"
      - "POSTGRES_BACKEND_USERNAME=backend"
      - "POSTGRES_BACKEND_PASSWORD=${POSTGRES_BACKEND_PASSWORD}"
    volumes:
      - "${USERDATA_BASEDIR}lock:/lock"
    networks:
      - internal
    depends_on:
      - db
      - rabbitmq
      - memcached
    restart: unless-stopped

  services:
    build: containers/backend
    init: true
    command: ["python3", "-u", "-m", "backend.services"]
    healthcheck:
      test: ["CMD-SHELL", "true"]
      interval: '20s'
      timeout: '5s'
      retries: 5
      start_period: '8s'
    env_file:
    - "env.global"
    - ".env"
    environment:
      - "STORAGE_DIR=/storage"
      - "POSTGRES_BACKEND_USERNAME=backend"
      - "POSTGRES_BACKEND_PASSWORD=${POSTGRES_BACKEND_PASSWORD}"
    networks:
      - internal
    depends_on:
      - db
      - rabbitmq
      - memcached
    restart: unless-stopped


