{% load i18n django_bootstrap5 static %}
<!DOCTYPE html>
<html lang="">
<head>
    <meta charset="utf-8">
    <!--
    Customize this policy to fit your own app's needs. For more guidance, please refer to the docs:
        https://cordova.apache.org/docs/en/latest/
    Some notes:
      * https://ssl.gstatic.com is required only on Android and is needed for TalkBack to function properly
      * Disables use of inline scripts in order to mitigate risk of XSS vulnerabilities. To change this:
        * Enable inline JS: add 'unsafe-inline' to default-src
    -->
    <!-- <meta http-equiv="Content-Security-Policy" content="default-src * 'self' 'unsafe-inline' 'unsafe-eval' blob: data: content:"> -->
    <meta http-equiv="Content-Security-Policy"
          content="media-src * 'unsafe-inline' 'unsafe-eval' http: https: cdvfile: filesystem: data:; img-src * http: https: cdvfile: filesystem: blob: data:; style-src * 'unsafe-inline'; default-src * 'unsafe-inline' 'unsafe-eval' http: https: cdvfile: filesystem: data: gap: content: blob:">
    <meta name="viewport"
          content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">

    <meta name="theme-color" content="#fff">
    <meta name="format-detection" content="telephone=no">
    <meta name="msapplication-tap-highlight" content="no">
    {% bootstrap_css %}
    {% bootstrap_javascript %}
    {% block extrastyle %}{% endblock %}
    <title>{% block title %}{{ title }}{% endblock %}</title>
    {% block extrahead %}{% endblock %}

</head>
<body>

{% block base %}
    <div class="row" style="height: 2em;"></div>
    <div class="row" style="height: 2em;">
        <div class="col-3"></div>
        <div class="col-6">
            {{ content | safe }}
        </div>
        <div class="col-3"></div>
    </div>
{% endblock %}
</body>
</html>
