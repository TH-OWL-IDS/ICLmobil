{% extends "admin/change_form.html" %}

{% load i18n admin_urls static admin_modify %}

{% block extrahead %}{{ block.super }}
    <script src="{% url 'admin:jsi18n' %}"></script>
    <link title="timeline-styles" rel="stylesheet"
          href="https://cdn.knightlab.com/libs/timeline3/latest/css/timeline.css">
    <script src="https://cdn.knightlab.com/libs/timeline3/latest/js/timeline.js"></script>

    <script src="https://visjs.github.io/vis-timeline/standalone/umd/vis-timeline-graph2d.min.js"></script>
    <link href="https://visjs.github.io/vis-timeline/styles/vis-timeline-graph2d.min.css" rel="stylesheet"
          type="text/css"/>
    {{ media }}
{% endblock %}

{% block form_before %}
    <h4><span id="booking_count"></span>{% translate "Buchungen zu diesem Fahrzeug" %}:</h4>
    <div id="visualization"></div>
    <div id="loading">loading...</div>
    <style>
        .vis-item .vis-item-overflow {
            overflow: visible;
        }
    </style>
    <script type="text/javascript">
        $.ajax({
            url: '{% url 'diagnostics-vehicle-timeline' vehicle_id=original.pk %}',
            success: function (data) {
                document.getElementById('booking_count').innerText = ""+data.length+" ";

                // hide the "loading..." message
                document.getElementById('loading').style.display = 'none';

                // DOM element where the Timeline will be attached
                var container = document.getElementById('visualization');

                // Create a DataSet (allows two way data-binding)
                var items = new vis.DataSet(data);

                const now = new Date();
                const startDate = new Date(now);
                startDate.setDate(now.getDate() - 2);
                const endDate = new Date(now);
                endDate.setDate(now.getDate() + 2);

                // Configuration for the Timeline
                var options = {
                    "start": startDate.toISOString(),
                    "end": endDate.toISOString()
                };

                // Create a Timeline
                var timeline = new vis.Timeline(container, items, options);
            },
            error: function (err) {
                console.log('Error', err);
                document.getElementById('loading').innerText = "Failed to load bookings";
            }
        });

    </script>
    {{ block.super }}
{% endblock %}
